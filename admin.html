<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Multicancha 8•H</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rojo:#C0392B; --rojo-oscuro:#922B21; --rojo-suave:#FADBD8;
    --verde:#27AE60; --verde-suave:#D5F5E3;
    --amarillo:#F39C12; --amarillo-suave:#FDEBD0;
    --gris-oscuro:#1C1C1E; --gris:#636366; --gris-claro:#AEAEB2;
    --borde:#E5E5EA; --fondo:#F2F2F7; --blanco:#FFFFFF;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--fondo); color:var(--gris-oscuro); min-height:100vh; }

  /* LOGIN */
  .login-screen { position:fixed; inset:0; background:var(--gris-oscuro); display:flex; align-items:center; justify-content:center; z-index:100; }
  .login-screen.hidden { display:none; }
  .login-box { background:#2C2C2E; border-radius:20px; padding:40px 32px; width:100%; max-width:360px; text-align:center; }
  .login-box .icon { font-size:48px; margin-bottom:16px; }
  .login-box h1 { font-family:'Bebas Neue',sans-serif; font-size:28px; color:white; letter-spacing:1px; margin-bottom:4px; }
  .login-box p { font-size:13px; color:var(--gris-claro); margin-bottom:28px; }
  .login-input { width:100%; padding:14px 16px; background:#3A3A3C; border:1.5px solid #48484A; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:15px; color:white; outline:none; margin-bottom:12px; transition:border-color 0.15s; }
  .login-input:focus { border-color:var(--rojo); }
  .login-input::placeholder { color:#636366; }
  .login-btn { width:100%; padding:15px; background:var(--rojo); color:white; border:none; border-radius:12px; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px; cursor:pointer; transition:background 0.15s; }
  .login-btn:hover { background:var(--rojo-oscuro); }
  .login-error { font-size:13px; color:#F1948A; margin-top:10px; min-height:20px; }

  /* HEADER */
  header { background:var(--gris-oscuro); position:sticky; top:0; z-index:50; box-shadow:0 2px 20px rgba(0,0,0,0.3); }
  .header-inner { max-width:900px; margin:0 auto; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .header-left { display:flex; align-items:center; gap:12px; }
  .logo { width:38px; height:38px; background:var(--rojo); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .header-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px; color:white; }
  .header-sub { font-size:11px; color:var(--gris-claro); }
  .btn-logout { padding:8px 16px; background:transparent; border:1px solid rgba(255,255,255,0.2); border-radius:8px; color:var(--gris-claro); font-size:12px; cursor:pointer; transition:all 0.15s; font-family:'DM Sans',sans-serif; }
  .btn-logout:hover { border-color:var(--rojo); color:white; }

  main { max-width:900px; margin:0 auto; padding:24px 16px 40px; }

  /* TABS */
  .tabs { display:flex; gap:8px; margin-bottom:24px; background:var(--blanco); padding:6px; border-radius:14px; border:1.5px solid var(--borde); }
  .tab { flex:1; padding:10px; border:none; background:transparent; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; color:var(--gris); cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; gap:6px; }
  .tab.active { background:var(--gris-oscuro); color:white; }
  .tab-badge { background:var(--rojo); color:white; border-radius:20px; padding:1px 7px; font-size:11px; font-weight:700; }

  /* SECCIONES */
  .section { display:none; }
  .section.active { display:block; }

  /* CARDS SOLICITUDES */
  .solicitud-card { background:var(--blanco); border-radius:14px; padding:18px 20px; margin-bottom:12px; border:1.5px solid var(--borde); transition:box-shadow 0.15s; }
  .solicitud-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.08); }
  .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:12px; }
  .card-nombre { font-weight:600; font-size:16px; }
  .card-fecha { font-size:13px; color:var(--gris); margin-top:2px; }
  .badge { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; flex-shrink:0; }
  .badge-pendiente { background:var(--amarillo-suave); color:var(--amarillo); }
  .badge-aprobado { background:var(--verde-suave); color:var(--verde); }
  .badge-rechazado { background:var(--rojo-suave); color:var(--rojo); }
  .card-details { display:grid; grid-template-columns:1fr 1fr; gap:6px 16px; margin-bottom:14px; }
  .detail-item { font-size:12px; }
  .detail-item span { color:var(--gris-claro); font-weight:500; display:block; font-size:10px; text-transform:uppercase; letter-spacing:0.4px; }
  .card-obs { font-size:13px; color:var(--gris); background:var(--fondo); border-radius:8px; padding:10px 12px; margin-bottom:14px; font-style:italic; }
  .card-actions { display:flex; gap:8px; }
  .btn-aprobar { flex:1; padding:11px; background:var(--verde); color:white; border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:background 0.15s; }
  .btn-aprobar:hover { background:#1E8449; }
  .btn-rechazar { flex:1; padding:11px; background:var(--rojo-suave); color:var(--rojo); border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.15s; }
  .btn-rechazar:hover { background:var(--rojo); color:white; }
  .btn-eliminar { padding:11px 16px; background:var(--fondo); color:var(--gris-claro); border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; cursor:pointer; transition:all 0.15s; }
  .btn-eliminar:hover { background:var(--rojo-suave); color:var(--rojo); }

  /* BLOQUEO MANUAL */
  .bloqueo-form { background:var(--blanco); border-radius:14px; padding:22px; border:1.5px solid var(--borde); margin-bottom:24px; }
  .bloqueo-form h3 { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.5px; margin-bottom:16px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
  .form-group label { display:block; font-size:11px; font-weight:600; color:var(--gris); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:5px; }
  .form-group input, .form-group select { width:100%; padding:11px 13px; border:1.5px solid var(--borde); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--gris-oscuro); background:var(--fondo); outline:none; transition:border-color 0.15s; }
  .form-group input:focus, .form-group select:focus { border-color:var(--rojo); background:white; }
  .btn-bloquear { padding:13px 24px; background:var(--gris-oscuro); color:white; border:none; border-radius:10px; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:0.5px; cursor:pointer; transition:background 0.15s; }
  .btn-bloquear:hover { background:var(--rojo); }

  .empty-state { text-align:center; padding:48px 20px; color:var(--gris-claro); }
  .empty-state .empty-icon { font-size:48px; margin-bottom:12px; }
  .empty-state p { font-size:15px; }

  .loader-overlay { position:fixed; inset:0; background:var(--gris-oscuro); z-index:99; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; transition:opacity 0.4s; }
  .loader-overlay.hidden { opacity:0; pointer-events:none; }
  .loader-spinner { width:40px; height:40px; border:3px solid rgba(255,255,255,0.1); border-top-color:var(--rojo); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loader-text { color:var(--gris-claro); font-size:14px; }

  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--gris-oscuro); color:white; padding:14px 22px; border-radius:14px; font-size:14px; font-weight:500; z-index:300; transition:transform 0.3s; white-space:nowrap; box-shadow:0 8px 30px rgba(0,0,0,0.3); border-left:4px solid var(--verde); }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast.error { border-left-color:var(--rojo); }

  @media(max-width:560px) {
    .card-details { grid-template-columns:1fr; }
    .form-row { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<div class="loader-overlay" id="loader">
  <div class="loader-spinner"></div>
  <div class="loader-text">Cargando...</div>
</div>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="icon">🔐</div>
    <h1>Panel Directiva</h1>
    <p>Junta de Vecinos 8•H Nueva Independencia</p>
    <input class="login-input" type="email" id="login-email" placeholder="Correo electrónico">
    <input class="login-input" type="password" id="login-pass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')iniciarSesion()">
    <button class="login-btn" onclick="iniciarSesion()">Ingresar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <div class="header-inner">
      <div class="header-left">
        <div class="logo">⚙️</div>
        <div>
          <div class="header-title">Panel Directiva</div>
          <div class="header-sub">Multicancha 8•H · <span id="user-email"></span></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <a href="multicancha.html" style="font-size:12px;color:var(--gris-claro);text-decoration:none;padding:8px 12px;border:1px solid rgba(255,255,255,0.1);border-radius:8px">← Ver calendario</a>
        <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
      </div>
    </div>
  </header>

  <main>
    <div class="tabs">
      <button class="tab active" onclick="cambiarTab('pendientes')" id="tab-pendientes">
        ⏳ Pendientes <span class="tab-badge" id="badge-pendientes">0</span>
      </button>
      <button class="tab" onclick="cambiarTab('historial')" id="tab-historial">
        📋 Historial
      </button>
      <button class="tab" onclick="cambiarTab('bloqueo')" id="tab-bloqueo">
        🔒 Bloquear
      </button>
    </div>

    <!-- PENDIENTES -->
    <div class="section active" id="sec-pendientes">
      <div id="lista-pendientes"></div>
    </div>

    <!-- HISTORIAL -->
    <div class="section" id="sec-historial">
      <div id="lista-historial"></div>
    </div>

    <!-- BLOQUEO MANUAL -->
    <div class="section" id="sec-bloqueo">
      <div class="bloqueo-form">
        <h3>Bloquear horario manualmente</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Fecha</label>
            <input type="date" id="bl-fecha">
          </div>
          <div class="form-group">
            <label>Hora</label>
            <select id="bl-hora">
              <option value="">Selecciona...</option>
              <option value="9">09:00 – 10:00</option>
              <option value="10">10:00 – 11:00</option>
              <option value="11">11:00 – 12:00</option>
              <option value="12">12:00 – 13:00</option>
              <option value="13">13:00 – 14:00</option>
              <option value="14">14:00 – 15:00</option>
              <option value="15">15:00 – 16:00</option>
              <option value="16">16:00 – 17:00</option>
              <option value="17">17:00 – 18:00</option>
              <option value="18">18:00 – 19:00</option>
              <option value="19">19:00 – 20:00</option>
              <option value="20">20:00 – 21:00</option>
              <option value="21">21:00 – 22:00</option>
              <option value="22">22:00 – 23:00</option>
              <option value="23">23:00 – 00:00</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:16px">
          <label>Motivo</label>
          <input type="text" id="bl-motivo" placeholder="Ej: Mantenimiento, evento de la junta...">
        </div>
        <button class="btn-bloquear" onclick="bloquearHorario()">Bloquear horario</button>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, addDoc, query, orderBy, Timestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBYkzafSjJL43B3OVJjXwba3B5L98WybCE",
    authDomain: "multicancha-8h.firebaseapp.com",
    projectId: "multicancha-8h",
    storageBucket: "multicancha-8h.firebasestorage.app",
    messagingSenderId: "562094526883",
    appId: "1:562094526883:web:7becb711d7400f9af9ca16"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let todasLasReservas = [];

  // ── AUTH ──────────────────────────────────────────────────────────
  onAuthStateChanged(auth, (user) => {
    document.getElementById('loader').classList.add('hidden');
    if (user) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('app').style.display = 'block';
      document.getElementById('user-email').textContent = user.email;
      escucharReservas();
    } else {
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('app').style.display = 'none';
    }
  });

  window.iniciarSesion = async function() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      errEl.textContent = 'Correo o contraseña incorrectos.';
    }
  };

  window.cerrarSesion = () => signOut(auth);

  // ── ESCUCHAR RESERVAS ─────────────────────────────────────────────
  function escucharReservas() {
    const q = query(collection(db, 'reservas'), orderBy('creadoEn', 'desc'));
    onSnapshot(q, (snap) => {
      todasLasReservas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderListas();
    });
  }

  function renderListas() {
    const pendientes = todasLasReservas.filter(r => r.estado === 'pendiente');
    const historial  = todasLasReservas.filter(r => r.estado !== 'pendiente');

    document.getElementById('badge-pendientes').textContent = pendientes.length;

    // Pendientes
    const lp = document.getElementById('lista-pendientes');
    if (pendientes.length === 0) {
      lp.innerHTML = `<div class="empty-state"><div class="empty-icon">✅</div><p>No hay solicitudes pendientes</p></div>`;
    } else {
      lp.innerHTML = pendientes.map(r => cardHTML(r, true)).join('');
    }

    // Historial
    const lh = document.getElementById('lista-historial');
    if (historial.length === 0) {
      lh.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>Sin registros en el historial</p></div>`;
    } else {
      lh.innerHTML = historial.map(r => cardHTML(r, false)).join('');
    }
  }

  function cardHTML(r, mostrarAcciones) {
    const badge = r.estado === 'pendiente'
      ? '<span class="badge badge-pendiente">⏳ Pendiente</span>'
      : r.estado === 'ocupado'
        ? '<span class="badge badge-aprobado">✓ Aprobado</span>'
        : '<span class="badge badge-rechazado">✗ Rechazado</span>';

    const fecha = r.fechaStr || '—';
    const hora  = r.hora !== undefined ? `${r.hora}:00 – ${r.hora===23?'00:00':`${r.hora+1}:00`}` : '—';

    return `
      <div class="solicitud-card">
        <div class="card-top">
          <div>
            <div class="card-nombre">${r.nombre || '—'}</div>
            <div class="card-fecha">📅 ${fecha} · 🕐 ${hora}</div>
          </div>
          ${badge}
        </div>
        <div class="card-details">
          <div class="detail-item"><span>RUT</span>${r.rut || '—'}</div>
          <div class="detail-item"><span>Teléfono</span>${r.telefono || '—'}</div>
          <div class="detail-item"><span>Actividad</span>${r.actividad || '—'}</div>
          <div class="detail-item"><span>Categoría</span>${r.categoria || '—'}</div>
          <div class="detail-item"><span>Personas</span>${r.personas || '—'}</div>
        </div>
        ${r.observaciones ? `<div class="card-obs">"${r.observaciones}"</div>` : ''}
        ${mostrarAcciones ? `
        <div class="card-actions">
          <button class="btn-aprobar" onclick="window._aprobar('${r.id}')">✓ Aprobar</button>
          <button class="btn-rechazar" onclick="window._rechazar('${r.id}')">✗ Rechazar</button>
          <button class="btn-eliminar" onclick="window._eliminar('${r.id}')">🗑</button>
        </div>` : `
        <div class="card-actions">
          <button class="btn-eliminar" style="flex:1" onclick="window._eliminar('${r.id}')">🗑 Eliminar del historial</button>
        </div>`}
      </div>`;
  }

  window._aprobar = async function(id) {
    try {
      await updateDoc(doc(db, 'reservas', id), { estado: 'ocupado' });
      mostrarToast('✓ Reserva aprobada');
    } catch(e) { mostrarToast('Error al aprobar', true); }
  };

  window._rechazar = async function(id) {
    try {
      await updateDoc(doc(db, 'reservas', id), { estado: 'rechazado' });
      mostrarToast('Solicitud rechazada');
    } catch(e) { mostrarToast('Error al rechazar', true); }
  };

  window._eliminar = async function(id) {
    if (!confirm('¿Eliminar este registro?')) return;
    try {
      await deleteDoc(doc(db, 'reservas', id));
      mostrarToast('Registro eliminado');
    } catch(e) { mostrarToast('Error al eliminar', true); }
  };

  window.bloquearHorario = async function() {
    const fechaVal = document.getElementById('bl-fecha').value;
    const horaVal  = parseInt(document.getElementById('bl-hora').value);
    const motivo   = document.getElementById('bl-motivo').value.trim();

    if (!fechaVal || isNaN(horaVal) || !motivo) {
      mostrarToast('⚠️ Completa todos los campos', true); return;
    }

    const fecha = new Date(fechaVal + 'T12:00:00');
    const y = fecha.getFullYear();
    const m = String(fecha.getMonth()+1).padStart(2,'0');
    const d = String(fecha.getDate()).padStart(2,'0');
    const key = `${y}-${m}-${d}-${String(horaVal).padStart(2,'0')}`;
    const fechaStr = fecha.toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric' });

    try {
      await addDoc(collection(db, 'reservas'), {
        key, estado:'ocupado', nombre:'Directiva',
        actividad: motivo, rut:'—', telefono:'—',
        categoria:'Directiva', personas:'—', observaciones:'',
        fechaStr, hora: horaVal,
        fechaTs: Timestamp.fromDate(fecha),
        creadoEn: Timestamp.now()
      });
      document.getElementById('bl-fecha').value = '';
      document.getElementById('bl-hora').value = '';
      document.getElementById('bl-motivo').value = '';
      mostrarToast(`✓ Horario bloqueado: ${fechaStr} ${horaVal}:00`);
    } catch(e) { mostrarToast('Error al bloquear', true); }
  };

  window.cambiarTab = function(tab) {
    ['pendientes','historial','bloqueo'].forEach(t => {
      document.getElementById(`tab-${t}`)?.classList.toggle('active', t===tab);
      document.getElementById(`sec-${t}`)?.classList.toggle('active', t===tab);
    });
  };

  function mostrarToast(msg, error=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.toggle('error', error);
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
