<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Historia — Junta de Vecinos 8•H</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --rojo: #C0392B; --rojo-oscuro: #922B21; --rojo-suave: #FADBD8;
    --dorado: #B7950B; --dorado-suave: #FCF3CF;
    --gris-oscuro: #1C1C1E; --gris-medio: #3A3A3C; --gris: #636366;
    --gris-claro: #AEAEB2; --borde: #E5E5EA; --fondo: #F2F2F7; --blanco: #FFFFFF;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--fondo); color:var(--gris-oscuro); min-height:100vh; }

  header { background:var(--gris-oscuro); color:white; position:sticky; top:0; z-index:100; box-shadow:0 2px 20px rgba(0,0,0,0.3); }
  .header-inner { max-width:720px; margin:0 auto; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .header-left { display:flex; align-items:center; gap:14px; }
  .logo-icon { width:42px; height:42px; background:var(--dorado); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .header-text h1 { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:1px; color:white; line-height:1; }
  .header-text p { font-size:11px; color:var(--gris-claro); margin-top:2px; font-weight:300; }
  .home-link { font-size:12px; color:var(--gris-claro); text-decoration:none; padding:8px 12px; border:1px solid rgba(255,255,255,0.15); border-radius:8px; transition:all 0.15s; }
  .home-link:hover { color:white; border-color:rgba(255,255,255,0.35); }

  main { max-width:720px; margin:0 auto; padding:0 16px 40px; }

  /* GALERÍA */
  .galeria { display:grid; grid-template-columns:2fr 1fr 1fr; grid-auto-rows:110px; gap:6px; margin:20px 0 28px; border-radius:16px; overflow:hidden; }
  .galeria img { width:100%; height:100%; object-fit:cover; cursor:pointer; display:block; transition:transform 0.2s; }
  .galeria img:hover { transform:scale(1.04); }
  .galeria .g-grande { grid-row:span 2; }
  .galeria .g-mas { position:relative; }
  .galeria .g-mas::after { content:attr(data-mas); position:absolute; inset:0; background:rgba(0,0,0,0.55); color:white; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.5px; }

  .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:500; align-items:center; justify-content:center; padding:24px; }
  .lightbox.visible { display:flex; }
  .lightbox img { max-width:100%; max-height:85vh; border-radius:8px; }
  .lightbox-close { position:absolute; top:20px; right:24px; color:white; font-size:32px; background:none; border:none; cursor:pointer; line-height:1; }
  .lightbox-nav { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.1); border:none; color:white; font-size:26px; width:48px; height:48px; border-radius:50%; cursor:pointer; }
  .lightbox-prev { left:16px; } .lightbox-next { right:16px; }

  /* INTRO / TEXTO */
  .intro { text-align:center; margin:24px 0 24px; }
  .intro h2 { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:0.5px; margin-bottom:8px; }
  .intro .linea { width:50px; height:3px; background:var(--dorado); margin:0 auto; border-radius:2px; }

  .historia-card { background:var(--blanco); border:1.5px solid var(--borde); border-radius:18px; padding:28px 26px; margin-bottom:28px; }
  .historia-texto { font-size:15px; line-height:1.8; color:var(--gris-medio); }
  .historia-texto p { margin-bottom:16px; }
  .historia-texto p:first-of-type::first-letter { font-family:'Bebas Neue',sans-serif; font-size:46px; color:var(--dorado); float:left; line-height:0.8; margin:6px 6px 0 0; }

  .empty-state { text-align:center; padding:50px 20px; color:var(--gris-claro); }
  .empty-state .icon { font-size:44px; margin-bottom:12px; }
  .empty-state p { font-size:14px; }

  /* LÍNEA DE TIEMPO */
  .timeline-titulo { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:0.5px; text-align:center; margin-bottom:24px; }
  .timeline { position:relative; padding-left:28px; margin-bottom:12px; }
  .timeline::before { content:''; position:absolute; left:7px; top:6px; bottom:6px; width:2px; background:var(--borde); }
  .hito { position:relative; padding-bottom:26px; }
  .hito:last-child { padding-bottom:0; }
  .hito::before { content:''; position:absolute; left:-28px; top:4px; width:16px; height:16px; border-radius:50%; background:var(--dorado); border:3px solid var(--blanco); box-shadow:0 0 0 2px var(--dorado); }
  .hito-anio { display:inline-block; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.5px; color:var(--dorado); background:var(--dorado-suave); padding:2px 12px; border-radius:8px; margin-bottom:6px; }
  .hito-evento { font-size:14px; color:var(--gris-medio); line-height:1.55; }

  footer { text-align:center; padding:20px 16px; font-size:11px; color:var(--gris-claro); border-top:1px solid var(--borde); margin-top:8px; font-weight:500; letter-spacing:0.3px; }

  @media(max-width:560px) {
    .galeria { grid-template-columns:1fr 1fr; grid-auto-rows:90px; }
    .galeria .g-grande { grid-row:span 1; grid-column:span 2; height:180px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <div class="logo-icon">📖</div>
      <div class="header-text">
        <h1>Nuestra Historia</h1>
        <p>Junta de Vecinos 8•H · Nueva Independencia</p>
      </div>
    </div>
    <a href="index.html" class="home-link">← Inicio</a>
  </div>
</header>

<main>
  <div class="galeria" id="galeria" style="display:none"></div>

  <div class="intro">
    <h2>Nuestra Historia</h2>
    <div class="linea"></div>
  </div>

  <div class="historia-card">
    <div class="historia-texto" id="historiaTexto">
      <div class="empty-state">
        <div class="icon">📖</div>
        <p>Cargando...</p>
      </div>
    </div>
  </div>

  <div id="timelineWrap" style="display:none">
    <div class="timeline-titulo">📍 Hitos importantes</div>
    <div class="timeline" id="timeline"></div>
  </div>
</main>

<footer>© Bryan Jaña Lizama · Junta de Vecinos Unidad Vecinal N.° 8H</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lbClose">×</button>
  <button class="lightbox-nav lightbox-prev" id="lbPrev">‹</button>
  <img id="lbImg" src="">
  <button class="lightbox-nav lightbox-next" id="lbNext">›</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBYkzafSjJL43B3OVJjXwba3B5L98WybCE",
    authDomain: "multicancha-8h.firebaseapp.com",
    projectId: "multicancha-8h",
    storageBucket: "multicancha-8h.firebasestorage.app",
    messagingSenderId: "562094526883",
    appId: "1:562094526883:web:7becb711d7400f9af9ca16"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let fotosActuales = [];
  let lbIndex = 0;

  onSnapshot(doc(db, 'info', 'historia'), (snap) => {
    const data = snap.exists() ? snap.data() : {};

    // Texto
    const texto = (data.texto || '').trim();
    const cont = document.getElementById('historiaTexto');
    if (texto) {
      cont.innerHTML = texto.split(/\n\s*\n/).map(p => `<p>${p.trim().replace(/\n/g,'<br>')}</p>`).join('');
    } else {
      cont.innerHTML = `
        <div class="empty-state">
          <div class="icon">📖</div>
          <p>La historia de nuestra junta de vecinos se publicará muy pronto.</p>
        </div>`;
    }

    // Galería (con compatibilidad con el campo antiguo "foto" único)
    fotosActuales = Array.isArray(data.fotos) && data.fotos.length ? data.fotos : (data.foto ? [data.foto] : []);
    renderGaleria();

    // Línea de tiempo
    const hitos = Array.isArray(data.hitos) ? [...data.hitos].sort((a,b) => (a.anio||0)-(b.anio||0)) : [];
    const timelineWrap = document.getElementById('timelineWrap');
    if (hitos.length) {
      timelineWrap.style.display = 'block';
      document.getElementById('timeline').innerHTML = hitos.map(h => `
        <div class="hito">
          <div class="hito-anio">${h.anio || ''}</div>
          <div class="hito-evento">${h.evento || ''}</div>
        </div>`).join('');
    } else {
      timelineWrap.style.display = 'none';
    }
  });

  function renderGaleria() {
    const gal = document.getElementById('galeria');
    if (!fotosActuales.length) { gal.style.display = 'none'; return; }
    gal.style.display = 'grid';
    const visibles = fotosActuales.slice(0, 5);
    const restantes = fotosActuales.length - visibles.length;
    gal.innerHTML = visibles.map((f, i) => {
      const esGrande = i === 0 ? 'g-grande' : '';
      const esUltimaConMas = (i === visibles.length - 1 && restantes > 0) ? 'g-mas' : '';
      const dataMas = esUltimaConMas ? `data-mas="+${restantes}"` : '';
      return `<img class="${esGrande} ${esUltimaConMas}" ${dataMas} src="${f}" onclick="window._abrirLightbox(${i})">`;
    }).join('');
  }

  window._abrirLightbox = function(i) {
    lbIndex = i;
    document.getElementById('lbImg').src = fotosActuales[lbIndex];
    document.getElementById('lightbox').classList.add('visible');
  };
  document.getElementById('lbClose').onclick = () => document.getElementById('lightbox').classList.remove('visible');
  document.getElementById('lightbox').onclick = (e) => { if (e.target.id === 'lightbox') e.currentTarget.classList.remove('visible'); };
  document.getElementById('lbPrev').onclick = () => { lbIndex = (lbIndex - 1 + fotosActuales.length) % fotosActuales.length; document.getElementById('lbImg').src = fotosActuales[lbIndex]; };
  document.getElementById('lbNext').onclick = () => { lbIndex = (lbIndex + 1) % fotosActuales.length; document.getElementById('lbImg').src = fotosActuales[lbIndex]; };
</script>
</body>
</html>
